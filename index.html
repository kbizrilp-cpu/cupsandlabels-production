<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Production Portal</title>
<style>
:root{--bg:#f0f2f7;--sur:#fff;--bdr:#e2e8f0;--brand:#0e1f3d;--acc:#f0a500;--green:#16a34a;--red:#dc2626;--muted:#64748b;--text:#1e293b;--nav:58px;}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);font-size:14px;}
.login-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--brand);padding:20px;position:fixed;inset:0;z-index:999;}
.login-card{background:#fff;border-radius:20px;padding:28px 22px;width:100%;max-width:360px;}
.login-logo{text-align:center;font-size:20px;font-weight:800;color:var(--brand);margin-bottom:4px;}
.login-sub{text-align:center;font-size:12px;color:var(--muted);margin-bottom:20px;}
.login-err{color:var(--red);font-size:13px;margin-bottom:8px;text-align:center;display:none;}
.fg{margin-bottom:11px;}
.fg label{display:block;font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;margin-bottom:4px;}
.fg input,.fg select,.fg textarea{width:100%;padding:10px 12px;border:1.5px solid var(--bdr);border-radius:10px;font-size:14px;color:var(--text);background:#fff;outline:none;-webkit-appearance:none;font-family:inherit;}
.fg input:focus,.fg select:focus{border-color:var(--brand);}
.fg textarea{resize:vertical;min-height:70px;}
.fg-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.topbar{background:var(--brand);color:#fff;display:flex;align-items:center;padding:10px 14px;gap:10px;position:sticky;top:0;z-index:100;}
.tbar-title{flex:1;font-size:14px;font-weight:700;}
.tbar-title small{display:block;font-size:10px;color:rgba(255,255,255,.5);font-weight:400;}
.sdot{width:8px;height:8px;border-radius:50%;background:#22c55e;flex-shrink:0;}
.uav{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;background:var(--acc);cursor:pointer;flex-shrink:0;}
.botnav{background:var(--brand);display:flex;position:fixed;bottom:0;left:0;right:0;height:var(--nav);z-index:100;border-top:1px solid rgba(255,255,255,.1);}
.bn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;cursor:pointer;color:rgba(255,255,255,.5);border:none;background:none;padding:5px 0;position:relative;font-family:inherit;}
.bn.active{color:#fff;}
.bn.active::after{content:'';position:absolute;top:0;left:20%;right:20%;height:2px;background:var(--acc);border-radius:0 0 3px 3px;}
.bn-icon{font-size:19px;}
.bn-lbl{font-size:10px;font-weight:600;}
.content{overflow-y:auto;padding-bottom:calc(var(--nav) + 8px);min-height:100vh;}
.page{display:none;padding:12px;max-width:580px;margin:0 auto;}
.page.active{display:block;}
.card{background:var(--sur);border-radius:12px;border:1px solid var(--bdr);padding:14px;margin-bottom:12px;}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;}
.scard{background:var(--sur);border:1px solid var(--bdr);border-radius:12px;padding:13px;border-top:3px solid var(--sc,var(--acc));}
.sc-lbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;margin-bottom:3px;}
.sc-val{font-size:22px;font-weight:800;color:var(--sc,var(--brand));line-height:1;}
.sc-sub{font-size:11px;color:var(--muted);margin-top:3px;}
.ocard{background:var(--sur);border:1px solid var(--bdr);border-radius:12px;padding:12px;margin-bottom:9px;cursor:pointer;position:relative;overflow:hidden;}
.ostripe{position:absolute;top:0;left:0;bottom:0;width:4px;}
.oinner{padding-left:10px;}
.cbadge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700;}
.cb-cl{background:#dbeafe;color:#1d4ed8;}
.cb-ef{background:#fee2e2;color:#b91c1c;}
.sbadge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700;}
.pbar{background:#e2e8f0;border-radius:20px;height:7px;overflow:hidden;margin:7px 0;}
.pbar-fill{height:100%;border-radius:20px;}
.search-wrap{position:relative;margin-bottom:10px;}
.search-wrap input{width:100%;padding:11px 14px 11px 36px;border:1.5px solid var(--bdr);border-radius:10px;font-size:14px;background:var(--sur);outline:none;}
.s-ico{position:absolute;left:11px;top:50%;transform:translateY(-50%);font-size:15px;color:var(--muted);}
.pill-row{display:flex;gap:7px;overflow-x:auto;padding:2px 0;margin-bottom:10px;scrollbar-width:none;}
.pill-row::-webkit-scrollbar{display:none;}
.pill{padding:5px 13px;border-radius:20px;border:1.5px solid var(--bdr);background:var(--sur);color:var(--muted);font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;flex-shrink:0;}
.pill.active{border-color:var(--brand);background:var(--brand);color:#fff;}
.sheet-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:300;}
.sheet-bg.open{display:block;}
.sheet{position:fixed;bottom:0;left:0;right:0;background:#fff;border-radius:20px 20px 0 0;z-index:301;max-height:94vh;display:flex;flex-direction:column;transform:translateY(100%);transition:transform .3s ease;}
.sheet.open{transform:translateY(0);}
.sh-handle{width:44px;height:4px;background:#d1d5db;border-radius:2px;margin:10px auto 0;flex-shrink:0;}
.sh-hd{padding:12px 16px 10px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;border-bottom:1px solid var(--bdr);}
.sh-title{font-size:16px;font-weight:700;flex:1;}
.sh-close{background:none;border:none;cursor:pointer;font-size:22px;color:var(--muted);padding:4px;}
.sh-body{overflow-y:auto;padding:16px;flex:1;-webkit-overflow-scrolling:touch;}
.sh-foot{padding:12px 16px;border-top:1px solid var(--bdr);flex-shrink:0;display:flex;gap:8px;padding-bottom:20px;}
.sb-list{display:flex;flex-direction:column;gap:9px;margin:12px 0;}
.sb{width:100%;padding:13px 16px;border-radius:12px;border:2px solid var(--bdr);background:#fff;font-size:14px;font-weight:700;cursor:pointer;text-align:left;display:flex;align-items:center;gap:12px;font-family:inherit;}
.sb.active{border-color:var(--brand);background:var(--brand);color:#fff;}
.sb-icon{font-size:22px;flex-shrink:0;}
.sb-cur{font-size:11px;font-weight:400;opacity:.7;margin-left:auto;}
.drow{display:flex;justify-content:space-between;align-items:flex-start;padding:9px 0;border-bottom:1px solid var(--bdr);gap:10px;font-size:13px;}
.drow:last-child{border-bottom:none;}
.dlbl{color:var(--muted);font-size:11px;font-weight:600;text-transform:uppercase;flex-shrink:0;min-width:85px;}
.dval{font-weight:600;text-align:right;word-break:break-word;}
.mat-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--bdr);font-size:13px;gap:8px;}
.mat-row:last-child{border-bottom:none;}
.mat-nm{flex:1;font-weight:600;}
.mat-num{font-size:12px;color:var(--muted);text-align:right;}
.mat-act{font-weight:700;color:var(--brand);}
.sch-wrap{overflow-x:auto;margin-bottom:12px;}
.sch-grid{display:grid;gap:1px;background:var(--bdr);border-radius:10px;overflow:hidden;font-size:12px;min-width:600px;}
.sch-hd{background:#f1f5f9;padding:8px 10px;font-weight:700;color:var(--muted);text-transform:uppercase;font-size:10px;}
.sch-mach{background:#f8faff;padding:10px;font-weight:700;color:var(--brand);font-size:11px;}
.sch-cell{background:var(--sur);padding:5px;min-height:48px;}
.sch-job{border-radius:6px;padding:4px 6px;font-size:10px;font-weight:700;cursor:pointer;margin-bottom:2px;}
.rtbl{width:100%;border-collapse:collapse;font-size:12px;}
.rtbl th{background:#f1f5f9;color:var(--muted);font-size:10px;font-weight:700;text-transform:uppercase;padding:8px 10px;text-align:left;border-bottom:1px solid var(--bdr);}
.rtbl td{padding:8px 10px;border-bottom:1px solid var(--bdr);}
.rtbl tr:last-child td{border-bottom:none;}
.btn{padding:11px 16px;border-radius:10px;border:none;cursor:pointer;font-size:13px;font-weight:700;display:inline-flex;align-items:center;justify-content:center;gap:6px;min-height:44px;font-family:inherit;flex:1;}
.btn-pri{background:var(--brand);color:#fff;}
.btn-grn{background:var(--green);color:#fff;}
.btn-out{background:#fff;color:var(--brand);border:1.5px solid var(--bdr);}
.btn-red{background:#fee2e2;color:var(--red);}
.btn-full{width:100%;margin-bottom:8px;}
.btn-sm{padding:6px 12px;font-size:12px;min-height:34px;border-radius:8px;flex:none;}
.sec-hd{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin:14px 0 8px;display:flex;justify-content:space-between;align-items:center;}
.empty{text-align:center;padding:36px 16px;color:var(--muted);}
.empty-ico{font-size:38px;margin-bottom:8px;}
hr{border:none;border-top:1px solid var(--bdr);margin:12px 0;}
.hidden{display:none!important;}
.tbl-wrap{overflow-x:auto;}
#toast{position:fixed;bottom:calc(var(--nav) + 12px);left:50%;transform:translateX(-50%) translateY(10px);background:var(--brand);color:#fff;padding:10px 18px;border-radius:10px;font-size:13px;font-weight:600;opacity:0;transition:all .3s;z-index:999;pointer-events:none;max-width:90vw;text-align:center;}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>

<div class="login-wrap" id="loginWrap">
  <div class="login-card">
    <div class="login-logo">🏭 PRODUCTION PORTAL</div>
    <div class="login-sub">Cups & Labels · Al Fatora Al Mowahda</div>
    <div class="fg"><label>Username</label><input id="li-u" placeholder="username" autocomplete="username"></div>
    <div class="fg"><label>Password</label><input id="li-p" type="password" placeholder="password" autocomplete="current-password"></div>
    <div class="login-err" id="li-err">Invalid username or password</div>
    <button class="btn btn-pri" style="width:100%" id="login-btn">Sign In</button>
  </div>
</div>

<div id="appWrap" class="hidden">
  <div class="topbar">
    <div class="tbar-title">🏭 Production Portal<small id="sync-lbl">Connecting…</small></div>
    <div style="display:flex;align-items:center;gap:8px">
      <div class="sdot" id="sdot" style="background:#f97316"></div>
      <div class="uav" id="nav-av" onclick="openUserMenu()">P</div>
    </div>
  </div>

  <div class="content">

    <div class="page active" id="page-dash">
      <div class="stats-grid">
        <div class="scard" style="--sc:#f0a500"><div class="sc-lbl">Open Jobs</div><div class="sc-val" id="s-open">—</div><div class="sc-sub">In production</div></div>
        <div class="scard" style="--sc:#16a34a"><div class="sc-lbl">Ready</div><div class="sc-val" id="s-ready">—</div><div class="sc-sub">For delivery</div></div>
        <div class="scard" style="--sc:#2563eb"><div class="sc-lbl">Cups & Labels</div><div class="sc-val" id="s-cl">—</div></div>
        <div class="scard" style="--sc:#c0392b"><div class="sc-lbl">Al Fatora</div><div class="sc-val" id="s-ef">—</div></div>
      </div>
      <div class="sec-hd">🔔 Ready for Delivery</div>
      <div id="d-ready"></div>
      <div class="sec-hd">⚡ Active Jobs</div>
      <div id="d-active"></div>
    </div>

    <div class="page" id="page-orders">
      <div class="search-wrap"><span class="s-ico">🔍</span><input type="text" id="ord-search" placeholder="Search orders…" oninput="renderOrdersList()"></div>
      <div class="pill-row" id="status-pills"></div>
      <div class="pill-row" id="comp-pills"></div>
      <div style="font-size:11px;color:var(--muted);margin-bottom:8px" id="orders-cnt"></div>
      <div id="orders-list"></div>
    </div>

    <div class="page" id="page-jobs">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
        <div><div style="font-size:16px;font-weight:700">Job Orders</div></div>
        <button class="btn btn-pri btn-sm" onclick="openNewJobSheet()">+ New</button>
      </div>
      <div class="search-wrap"><span class="s-ico">🔍</span><input type="text" id="job-search" placeholder="Search job orders…" oninput="renderJobsList()"></div>
      <div class="pill-row" id="job-pills"></div>
      <div id="jobs-list"></div>
    </div>

    <div class="page" id="page-sched">
      <div style="font-size:16px;font-weight:700;margin-bottom:4px">Weekly Schedule</div>
      <div class="fg-row" style="margin-bottom:10px">
        <div class="fg"><label>Week Starting</label><input type="date" id="sched-week" onchange="renderSchedule()"></div>
        <div class="fg"><label>Company</label><select id="sched-comp" onchange="renderSchedule()"><option value="">All</option><option value="cups">Cups & Labels</option><option value="efatoura">Al Fatora</option></select></div>
      </div>
      <div class="sch-wrap"><div id="sched-grid"></div></div>
      <div class="sec-hd">Assign Job to Machine</div>
      <div class="card">
        <div class="fg"><label>Job Order</label><select id="assign-job"><option value="">Select job order…</option></select></div>
        <div class="fg-row">
          <div class="fg"><label>Machine</label><select id="assign-mach">
            <option value="">Select…</option>
            <option>8 Color Bentac</option><option>Gallus 6 Color 1</option><option>Gallus 6 Color 2</option>
            <option>Zonten 6 Color Ry 470</option><option>Zonten 2 Color Ry 470</option><option>Comco</option>
            <option>Link Label</option><option>Zonten 6 Color Ry 1000</option><option>Weigang 4 Color 900</option>
          </select></div>
          <div class="fg"><label>Start Date</label><input type="date" id="assign-start"></div>
        </div>
        <div class="fg"><label>Expected Finish</label><input type="date" id="assign-end"></div>
        <button class="btn btn-grn" style="width:100%;margin-top:8px" onclick="assignToMachine()">✓ Assign to Machine</button>
      </div>
    </div>

    <div class="page" id="page-reports">
      <div style="font-size:16px;font-weight:700;margin-bottom:8px">Reports</div>
      <div class="pill-row" id="report-tabs"></div>
      <div class="fg-row" style="margin-bottom:8px">
        <div class="fg"><label>From</label><input type="date" id="rep-from"></div>
        <div class="fg"><label>To</label><input type="date" id="rep-to"></div>
      </div>
      <div style="display:flex;gap:8px;margin-bottom:12px">
        <button class="btn btn-pri" onclick="runReport()">🔍 Generate</button>
        <button class="btn btn-out" onclick="printReport()">🖨️ Print</button>
      </div>
      <div id="report-out"></div>
    </div>

  </div>

  <div class="botnav">
    <button class="bn active" onclick="goPage('dash',this)"><span class="bn-icon">📊</span><span class="bn-lbl">Dashboard</span></button>
    <button class="bn" onclick="goPage('orders',this)"><span class="bn-icon">📦</span><span class="bn-lbl">CRM Orders</span></button>
    <button class="bn" onclick="goPage('jobs',this)"><span class="bn-icon">🏭</span><span class="bn-lbl">Job Orders</span></button>
    <button class="bn" onclick="goPage('sched',this)"><span class="bn-icon">📅</span><span class="bn-lbl">Schedule</span></button>
    <button class="bn" onclick="goPage('reports',this)"><span class="bn-icon">📈</span><span class="bn-lbl">Reports</span></button>
  </div>
</div>

<div class="sheet-bg" id="sheet-bg"></div>
<div class="sheet" id="sheet">
  <div class="sh-handle"></div>
  <div class="sh-hd">
    <div class="sh-title" id="sh-title">Details</div>
    <button class="sh-close" onclick="closeSheet()">✕</button>
  </div>
  <div class="sh-body" id="sh-body"></div>
  <div class="sh-foot" id="sh-foot"></div>
</div>
<div id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script>
// ── USERS ──
var USERS = {
  prod_admin:  { pass:'prod123',  name:'Production Admin', role:'admin',    av:'PA' },
  operator1:   { pass:'op123',    name:'Operator 1',       role:'operator', av:'O1' },
  operator2:   { pass:'op456',    name:'Operator 2',       role:'operator', av:'O2' },
  supervisor1: { pass:'sup123',   name:'Supervisor',       role:'admin',    av:'SV' }
};
var CU = null;
var db = null;
var crmOrders = {}, jobOrders = {}, schedules = {};
var statusFilter = '', compFilter = '', jobStatusFilter = '', activeReport = 'daily';

// ── LOGIN ──
document.getElementById('login-btn').onclick = doLogin;
document.getElementById('li-u').addEventListener('keydown', function(e){ if(e.key==='Enter') doLogin(); });
document.getElementById('li-p').addEventListener('keydown', function(e){ if(e.key==='Enter') doLogin(); });

function doLogin() {
  var u = (document.getElementById('li-u').value || '').trim().toLowerCase();
  var p = (document.getElementById('li-p').value || '').trim();
  var err = document.getElementById('li-err');
  err.style.display = 'none';
  if (!u || !p) { err.style.display = 'block'; err.textContent = 'Enter username and password'; return; }
  var user = USERS[u];
  if (!user || user.pass !== p) { err.style.display = 'block'; err.textContent = 'Invalid username or password'; return; }
  CU = { id: u, pass: user.pass, name: user.name, role: user.role, av: user.av };
  document.getElementById('loginWrap').style.display = 'none';
  document.getElementById('appWrap').classList.remove('hidden');
  document.getElementById('nav-av').textContent = CU.av;
  initFirebase();
}

function doLogout() {
  CU = null;
  document.getElementById('loginWrap').style.display = 'flex';
  document.getElementById('appWrap').classList.add('hidden');
  document.getElementById('li-u').value = '';
  document.getElementById('li-p').value = '';
  closeSheet();
}

// ── FIREBASE ──
function initFirebase() {
  if (!db) {
    var cfg = { databaseURL: 'https://cups-and-labels-default-rtdb.firebaseio.com' };
    if (!firebase.apps.length) firebase.initializeApp(cfg);
    db = firebase.database();
  }
  db.ref('.info/connected').on('value', function(snap) {
    var ok = snap.val();
    document.getElementById('sdot').style.background = ok ? '#22c55e' : '#ef4444';
    document.getElementById('sync-lbl').textContent = ok ? 'Live · Firebase' : 'Reconnecting…';
  });
  db.ref('production/orders').on('value', function(snap) {
    var raw = snap.val() || {};
    Object.keys(raw).forEach(function(k) {
      if (raw[k].status === 'queue') raw[k].status = 'order_received';
    });
    crmOrders = raw;
    renderDash(); renderOrdersList(); buildStatusPills(); buildCompPills();
  });
  db.ref('job_orders').on('value', function(snap) {
    jobOrders = snap.val() || {};
    renderDash(); renderJobsList(); renderJobPills(); populateAssignJob();
  });
  db.ref('machine_schedule').on('value', function(snap) {
    schedules = snap.val() || {};
    renderSchedule();
  });
  // init dates
  var now = new Date();
  var weekAgo = new Date(now - 7*864e5);
  document.getElementById('rep-from').value = weekAgo.toISOString().slice(0,10);
  document.getElementById('rep-to').value = now.toISOString().slice(0,10);
  var monday = new Date(now);
  monday.setDate(now.getDate() - ((now.getDay()+6)%7));
  document.getElementById('sched-week').value = monday.toISOString().slice(0,10);
  document.getElementById('assign-start').value = monday.toISOString().slice(0,10);
  document.getElementById('assign-end').value = new Date(monday.getTime()+4*864e5).toISOString().slice(0,10);
  buildReportTabs();
}

// ── STAGES ──
var STAGES = [
  { key:'order_received',  label:'Order Received',      icon:'📋', color:'#475569', bg:'#f1f5f9', pct:10 },
  { key:'under_design',    label:'Under Design',         icon:'🎨', color:'#7c3aed', bg:'#f5f3ff', pct:22 },
  { key:'design_approval', label:'Design Approval',      icon:'👁️', color:'#d97706', bg:'#fff7ed', pct:33 },
  { key:'no_material',     label:'No Material',          icon:'⚠️', color:'#dc2626', bg:'#fef2f2', pct:33 },
  { key:'printing',        label:'Printing',             icon:'🖨️', color:'#1d4ed8', bg:'#dbeafe', pct:50 },
  { key:'die_cutting',     label:'Die Cutting',          icon:'✂️', color:'#0891b2', bg:'#ecfeff', pct:65 },
  { key:'slitting',        label:'Slitting',             icon:'🔧', color:'#059669', bg:'#d1fae5', pct:78 },
  { key:'packing',         label:'Packing',              icon:'📦', color:'#9333ea', bg:'#fdf4ff', pct:90 },
  { key:'ready',           label:'Ready for Delivery',   icon:'✅', color:'#16a34a', bg:'#dcfce7', pct:100 }
];

function getStage(k) { return STAGES.find(function(s){ return s.key===k; }) || STAGES[0]; }

function stageBadge(k) {
  var s = getStage(k);
  return '<span class="sbadge" style="background:'+s.bg+';color:'+s.color+'">'+s.icon+' '+s.label+'</span>';
}

function compBadge(company) {
  var c = company || '';
  if (c.indexOf('cups') !== -1 || c === 'cups') return '<span class="cbadge cb-cl">🔵 Cups &amp; Labels</span>';
  if (c.indexOf('efatoura') !== -1 || c === 'efatoura' || c === 'ef') return '<span class="cbadge cb-ef">🔴 Al Fatora</span>';
  return '<span class="cbadge" style="background:#f1f5f9;color:#475569">🔧 Manual</span>';
}

function compColor(company) {
  var c = company || '';
  if (c.indexOf('cups') !== -1 || c === 'cups') return '#2563eb';
  if (c.indexOf('efatoura') !== -1 || c === 'efatoura' || c === 'ef') return '#c0392b';
  return '#64748b';
}

function isCL(o) { var c=o.company||''; return c==='cups'||c.indexOf('cups')!==-1; }
function isEF(o) { var c=o.company||''; return c==='efatoura'||c==='ef'||c.indexOf('efatoura')!==-1; }

// ── NAV ──
function goPage(name, btn) {
  document.querySelectorAll('.page').forEach(function(p){ p.classList.remove('active'); });
  document.querySelectorAll('.bn').forEach(function(b){ b.classList.remove('active'); });
  document.getElementById('page-'+name).classList.add('active');

// ── DASHBOARD ──
function renderDash() {
  var all = Object.values(crmOrders).concat(Object.values(jobOrders));
  var open = all.filter(function(o){ return o.status && o.status !== 'ready'; }).length;
  var ready = all.filter(function(o){ return o.status === 'ready'; }).length;
  var cl = all.filter(isCL).length;
  var ef = all.filter(isEF).length;
  document.getElementById('s-open').textContent = open;
  document.getElementById('s-ready').textContent = ready;
  document.getElementById('s-cl').textContent = cl;
  document.getElementById('s-ef').textContent = ef;
  var readyList = all.filter(function(o){ return o.status === 'ready'; }).slice(0, 6);
  document.getElementById('d-ready').innerHTML = readyList.length ? readyList.map(miniCard).join('') : '<div class="empty"><div class="empty-ico">📭</div><div>No orders ready</div></div>';
  var active = all.filter(function(o){ return o.status && o.status !== 'ready'; }).sort(function(a,b){ return (b.updatedAt||0)-(a.updatedAt||0); }).slice(0, 10);
  document.getElementById('d-active').innerHTML = active.length ? active.map(miniCard).join('') : '<div class="empty"><div class="empty-ico">📋</div><div>No active jobs</div></div>';
}

function getObjKey(o) {
  var ck = Object.keys(crmOrders).find(function(k){ return crmOrders[k] === o; });
  if (ck) return { key: ck, type: 'crm' };
  var jk = Object.keys(jobOrders).find(function(k){ return jobOrders[k] === o; });
  if (jk) return { key: jk, type: 'job' };
  return { key: '', type: 'crm' };
}

function miniCard(o) {
  var info = getObjKey(o);
  var s = getStage(o.status || 'order_received');
  var col = compColor(o.company);
  var etdHtml = o.etd ? '<span style="font-size:10px;color:'+(new Date(o.etd)<new Date()?'#dc2626':'#059669')+'">📅 '+o.etd+'</span>' : '';
  var isJob = info.type === 'job';
  var fn = isJob ? 'openJobDetail' : 'openOrderDetail';
  var num = o.jobOrderNum || o.orderNum || info.key;
  return '<div class="ocard" onclick="'+fn+'(\''+info.key+'\')">'
    + '<div class="ostripe" style="background:'+col+'"></div>'
    + '<div class="oinner">'
    + '<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px">'
    + '<div>'
    + '<div style="font-size:11px;color:var(--muted)">'+(isJob?'<span style="background:#e0e7ff;color:#3730a3;padding:1px 6px;border-radius:10px;font-size:10px">JO</span> ':'')+num+'</div>'
    + '<div style="font-size:15px;font-weight:700;color:var(--brand);margin:2px 0">'+(o.customerName||o.customer||'—')+'</div>'
    + '<div style="font-size:12px;color:var(--muted)">'+(o.product||o.job||'—')+(o.qty?' · '+o.qty+' rolls':'')+'</div>'
    + '</div>'
    + '<div style="text-align:right;flex-shrink:0">'+stageBadge(o.status||'order_received')+'<div style="margin-top:4px">'+compBadge(o.company)+'</div></div>'
    + '</div>'
    + '<div class="pbar"><div class="pbar-fill" style="width:'+s.pct+'%;background:'+s.color+'"></div></div>'
    + '<div style="display:flex;justify-content:space-between;font-size:11px;color:var(--muted)"><span>'+s.icon+' '+s.label+'</span>'+etdHtml+'</div>'
    + '</div></div>';
}

function renderOrdersList() {
  var q = (document.getElementById('ord-search') || {}).value || '';
  var sq = q.toLowerCase();
  var entries = Object.entries(crmOrders).map(function(e){ return Object.assign({}, e[1], {_key: e[0]}); });
  var filtered = entries.filter(function(o) {
    if (compFilter === 'cl' && !isCL(o)) return false;
    if (compFilter === 'ef' && !isEF(o)) return false;
    if (statusFilter && (o.status||'order_received') !== statusFilter) return false;
    if (sq) {
      var hay = ((o.customerName||'')+(o.customer||'')+(o.orderNum||'')+(o.product||'')).toLowerCase();
      if (hay.indexOf(sq) === -1) return false;
    }
    return true;
  }).sort(function(a,b){ return (b.updatedAt||0)-(a.updatedAt||0); });
  document.getElementById('orders-cnt').textContent = 'Showing '+filtered.length+' of '+entries.length+' orders';
  document.getElementById('orders-list').innerHTML = filtered.length ? filtered.map(miniCard).join('') : '<div class="empty"><div class="empty-ico">📭</div><div>No orders found</div></div>';

async function convertToJob(crmKey) {
  var o = crmOrders[crmKey];
  if (!o) { showToast('Not found'); return; }
  var existing = Object.values(jobOrders).find(function(j){ return j.crmKey === crmKey; });
  if (existing) { showToast('Already converted!'); return; }
  var now = new Date();
  var seq = Object.keys(jobOrders).length + 1;
  var jobNum = 'JO-'+now.getFullYear()+'-'+String(seq).padStart(4,'0');
  var job = {
    jobOrderNum: jobNum, crmKey: crmKey, company: o.company, companyName: o.companyName,
    customer: o.customerName||o.customer, orderNum: o.orderNum, soNumber: o.soNumber,
    product: o.product||o.job, material: o.material, size: o.size, qty: o.qty,
    core: o.core, winding: o.winding, colors: o.colors, etd: o.etd, notes: o.notes,
    status: 'order_received', materialsNeeded: [], materialsUsed: [],
    qtyProduced: 0, createdAt: Date.now(), updatedAt: Date.now(), createdBy: CU.id
  };
  await db.ref('job_orders/'+jobNum).set(job);
  showToast('✅ '+jobNum+' created!');
  closeSheet();
  setTimeout(function(){ goPage('jobs', document.querySelectorAll('.bn')[2]); openJobDetail(jobNum); }, 500);
}

  var body = '<div class="fg"><label>Material Name *</label><input id="mat-nm" placeholder="e.g. White PP 80gsm"></div>'

async function saveMat(jobKey, type) {
  var name = ((document.getElementById('mat-nm') || {}).value || '').trim();
  var qty = parseFloat((document.getElementById('mat-qty') || {}).value) || 0;
  if (!name || !qty) { showToast('Name and quantity required'); return; }
  var entry = {
    name: name, qty: qty,
    unit: (document.getElementById('mat-unit') || {}).value || '',
    jumboWidth: (document.getElementById('mat-jumbo') || {}).value || '',
    type: (document.getElementById('mat-type') || {}).value || '',
    date: (document.getElementById('mat-date') || {}).value || '',
    notes: (document.getElementById('mat-notes') || {}).value || '',
    addedBy: CU.id, addedAt: Date.now()
  };
  var j = jobOrders[jobKey];
  if (!j) return;
  var field = type === 'needed' ? 'materialsNeeded' : 'materialsUsed';
  var arr = Array.isArray(j[field]) ? j[field].slice() : [];
  arr.push(entry);
  await db.ref('job_orders/'+jobKey+'/'+field).set(arr);
  await db.ref('job_orders/'+jobKey).update({ updatedAt: Date.now() });
  showToast('✓ Material saved');
  setTimeout(function(){ openJobDetail(jobKey); }, 300);
}

  var num = (document.getElementById('nj-num') || {}).value;
  var job = {
    jobOrderNum: num, company: (document.getElementById('nj-comp') || {}).value || 'cups',
    customer: cust, soNumber: (document.getElementById('nj-so') || {}).value || '',
    poNumber: (document.getElementById('nj-po') || {}).value || '',
    product: (document.getElementById('nj-prod') || {}).value || '',
    qty: (document.getElementById('nj-qty') || {}).value || '',
    etd: (document.getElementById('nj-etd') || {}).value || '',
    material: (document.getElementById('nj-mat') || {}).value || '',
    size: (document.getElementById('nj-size') || {}).value || '',
    notes: (document.getElementById('nj-notes') || {}).value || '',
    status: 'order_received', materialsNeeded: [], materialsUsed: [],
    qtyProduced: 0, createdAt: Date.now(), updatedAt: Date.now(), createdBy: CU.id
  };
  await db.ref('job_orders/'+num).set(job);
  showToast('✅ '+num+' created!');
  closeSheet();
}

// ── PRINT JOB ORDER ──

  var o = type === 'job' ? jobOrders[key] : crmOrders[key];
  if (!o) { showToast('Not found'); return; }
  var mn = o.materialsNeeded || [];
  var mu = o.materialsUsed || [];
  var s = getStage(o.status || 'order_received');
  var win = window.open('', '_blank');
  var mnRows = mn.map(function(m){ return '<tr><td>'+m.name+'</td><td>'+m.qty+'</td><td>'+(m.unit||'')+'</td><td>'+(m.jumboWidth?m.jumboWidth+'mm':'—')+'</td><td>'+(m.type||'—')+'</td></tr>'; }).join('');
  var muRows = mu.map(function(m){ return '<tr><td>'+m.name+'</td><td>'+m.qty+'</td><td>'+(m.unit||'')+'</td><td>'+(m.jumboWidth?m.jumboWidth+'mm':'—')+'</td><td>'+(m.date||'—')+'</td></tr>'; }).join('');
  var html = '<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Job Order</title>'
    + '<style>body{font-family:Arial,sans-serif;margin:20px;font-size:13px;color:#1e293b}'
    + 'h1{font-size:22px;font-weight:800;color:#0e1f3d}h2{font-size:13px;font-weight:700;color:#475569;text-transform:uppercase;margin:16px 0 8px;border-bottom:1px solid #e2e8f0;padding-bottom:4px}'
    + '.hdr{display:flex;justify-content:space-between;margin-bottom:20px;border-bottom:2px solid #0e1f3d;padding-bottom:14px}'
    + '.grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}'
    + '.fld{padding:8px;background:#f8faff;border-radius:6px;border:1px solid #e2e8f0}'
    + '.fld label{display:block;font-size:10px;font-weight:700;color:#64748b;text-transform:uppercase;margin-bottom:2px}'
    + '.fld span{font-size:14px;font-weight:600}'
    + '.sts{padding:10px;border-radius:8px;font-weight:700;text-align:center;margin:12px 0;background:#dbeafe;color:#1d4ed8}'
    + 'table{width:100%;border-collapse:collapse;font-size:12px;margin-top:8px}'
    + 'th{background:#f1f5f9;color:#475569;text-align:left;padding:7px 10px;font-size:10px;text-transform:uppercase}'
    + 'td{padding:7px 10px;border-bottom:1px solid #e2e8f0}'
    + '.sigs{display:grid;grid-template-columns:1fr 1fr 1fr;gap:20px;margin-top:30px}'
    + '.sig{border-top:1.5px solid #0e1f3d;padding-top:6px;font-size:11px;color:#64748b;text-align:center}'
    + '@media print{@page{margin:10mm;size:A4}}</style></head><body>'
    + '<div class="hdr"><div><div style="font-size:14px;font-weight:700;color:#0e1f3d">CUPS AND LABELS</div><div style="font-size:11px;color:#64748b">Job Order</div></div>'
    + '<div style="text-align:right"><h1>'+(o.jobOrderNum||o.orderNum||key)+'</h1><div style="font-size:11px;color:#64748b">Printed: '+new Date().toLocaleDateString()+'</div></div></div>'
    + '<div class="sts">'+s.icon+' '+s.label+'</div>'
    + '<h2>Order Details</h2><div class="grid">'
    + '<div class="fld"><label>Customer</label><span>'+(o.customerName||o.customer||'—')+'</span></div>'
    + '<div class="fld"><label>SO Number</label><span>'+(o.soNumber||'—')+'</span></div>'
    + '<div class="fld"><label>ETD</label><span>'+(o.etd||'—')+'</span></div>'
    + '<div class="fld"><label>Quantity</label><span>'+(o.qty?o.qty+' rolls':'—')+'</span></div>'
    + '<div class="fld"><label>Product</label><span>'+(o.product||o.job||'—')+'</span></div>'
    + '<div class="fld"><label>Material</label><span>'+(o.material||'—')+'</span></div>'
    + '<div class="fld"><label>Size</label><span>'+(o.size||'—')+'</span></div>'
    + '<div class="fld"><label>Core / Winding</label><span>'+(o.core||'—')+(o.winding?' / '+o.winding:'')+'</span></div>'
    + '</div>'
    + (mn.length ? '<h2>Materials Needed</h2><table><tr><th>Material</th><th>Qty</th><th>Unit</th><th>Jumbo Width</th><th>Type</th></tr>'+mnRows+'</table>' : '')
    + (mu.length ? '<h2>Materials Used</h2><table><tr><th>Material</th><th>Qty</th><th>Unit</th><th>Jumbo Width</th><th>Date</th></tr>'+muRows+'</table>' : '')
    + (o.prodNotes ? '<h2>Production Notes</h2><div style="padding:10px;background:#f8faff;border-radius:6px">'+o.prodNotes+'</div>' : '')
    + '<div class="sigs"><div class="sig">Production Manager</div><div class="sig">Operator</div><div class="sig">QC / Delivery</div></div>'
    + '</body></html>';
  win.document.write(html);

// ── SCHEDULE ──
var MACHINES = ['8 Color Bentac','Gallus 6 Color 1','Gallus 6 Color 2','Zonten 6 Color Ry 470','Zonten 2 Color Ry 470','Comco','Link Label','Zonten 6 Color Ry 1000','Weigang 4 Color 900'];
var MACH_COLORS = {'8 Color Bentac':'#1d4ed8','Gallus 6 Color 1':'#7c3aed','Gallus 6 Color 2':'#9333ea','Zonten 6 Color Ry 470':'#0891b2','Zonten 2 Color Ry 470':'#059669','Comco':'#d97706','Link Label':'#dc2626','Zonten 6 Color Ry 1000':'#475569','Weigang 4 Color 900':'#b45309'};
var DAYS = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];

function getWeekDates() {
  var base = new Date((document.getElementById('sched-week') || {}).value || new Date().toISOString().slice(0,10));
  return DAYS.map(function(_, i){ var d=new Date(base); d.setDate(base.getDate()+i); return d.toISOString().slice(0,10); });
}

function renderSchedule() {
  var weekDates = getWeekDates();
  var jobMap = {};
  Object.values(schedules).forEach(function(s) {
    if (!s.machine || !s.startDate || !s.endDate) return;
    if (!jobMap[s.machine]) jobMap[s.machine] = {};
    var start = new Date(s.startDate), end = new Date(s.endDate);
    weekDates.forEach(function(d, i) {
      var dt = new Date(d);
      if (dt >= start && dt <= end) {
        if (!jobMap[s.machine][i]) jobMap[s.machine][i] = [];
        jobMap[s.machine][i].push(s);
      }
    });
  });
  var html = '<div class="sch-grid" style="grid-template-columns:120px repeat(7,1fr)">';
  html += '<div class="sch-hd">Machine</div>';
  weekDates.forEach(function(d, i){ html += '<div class="sch-hd">'+DAYS[i]+'<br><span style="font-size:9px">'+d.slice(5)+'</span></div>'; });
  MACHINES.forEach(function(m) {
    var col = MACH_COLORS[m] || '#475569';
    html += '<div class="sch-mach" style="border-left:3px solid '+col+'">'+m+'</div>';
    weekDates.forEach(function(_, i) {
      var cell = jobMap[m] && jobMap[m][i];
      html += '<div class="sch-cell">';
      if (cell && cell.length) {
        cell.forEach(function(s) {
          var j = jobOrders[s.jobKey];
          var c = j ? compColor(j.company) : '#475569';
          html += '<div class="sch-job" style="background:'+c+'20;color:'+c+';border:1px solid '+c+'40" onclick="openJobDetail(\''+s.jobKey+'\')">'+(j?(j.customer||'').slice(0,8):s.jobKey.slice(0,6))+'</div>';
        });
      } else { html += '<div style="color:#e2e8f0;display:flex;align-items:center;justify-content:center;height:100%;font-size:16px">·</div>'; }
      html += '</div>';
    });
  });
  html += '</div>';
  document.getElementById('sched-grid').innerHTML = html;
  populateAssignJob();
}

function populateAssignJob() {
  var sel = document.getElementById('assign-job');
  if (!sel) return;
  var jobs = Object.entries(jobOrders).filter(function(e){ return e[1].status !== 'ready'; }).sort(function(a,b){ return (b[1].updatedAt||0)-(a[1].updatedAt||0); });
  sel.innerHTML = '<option value="">Select job order…</option>' + jobs.map(function(e){ return '<option value="'+e[0]+'">'+( e[1].jobOrderNum||e[0])+' — '+(e[1].customer||'?')+'</option>'; }).join('');
}

async function assignToMachine() {
  var jobKey = (document.getElementById('assign-job') || {}).value;
  var machine = (document.getElementById('assign-mach') || {}).value;
  var startDate = (document.getElementById('assign-start') || {}).value;
  var endDate = (document.getElementById('assign-end') || {}).value;
  if (!jobKey || !machine || !startDate || !endDate) { showToast('Fill all fields'); return; }
  var schedKey = machine.replace(/\s+/g,'_')+'_'+jobKey;
  await db.ref('machine_schedule/'+schedKey).set({ jobKey: jobKey, machine: machine, startDate: startDate, endDate: endDate, assignedBy: CU.id, assignedAt: Date.now() });
  showToast('✓ Assigned to '+machine);
}

// ── REPORTS ──
var REPORT_TYPES = [{key:'daily',label:'Daily Production'},{key:'pending',label:'Pending Orders'},{key:'materials',label:'Materials Used'},{key:'machine',label:'Machine Performance'}];

function buildReportTabs() {
  document.getElementById('report-tabs').innerHTML = REPORT_TYPES.map(function(r){
    return '<div class="pill'+(activeReport===r.key?' active':'')+'" onclick="setReport(\''+r.key+'\',this)">'+r.label+'</div>';
  }).join('');
}

function setReport(k, el) {
  activeReport = k;
  document.querySelectorAll('#report-tabs .pill').forEach(function(p){ p.classList.remove('active'); });
  el.classList.add('active');
}

function runReport() {
  var from = new Date((document.getElementById('rep-from') || {}).value || '2000-01-01');
  var to = new Date((document.getElementById('rep-to') || {}).value || '2100-01-01');
  to.setHours(23,59,59);
  var allJobs = Object.values(jobOrders);
  var allOrders = Object.values(crmOrders).concat(allJobs);
  var filtered = allOrders.filter(function(o){ var d=new Date(o.createdAt||o.updatedAt||0); return d>=from && d<=to; });
  var html = '';
  if (activeReport === 'daily') {
    var rows = filtered.map(function(o){ return '<tr><td>'+(o.jobOrderNum||o.orderNum||'—')+'</td><td>'+(o.customerName||o.customer||'—')+'</td><td>'+(isCL(o)?'C&L':isEF(o)?'AF':'Manual')+'</td><td>'+(o.product||o.job||'—')+'</td><td>'+getStage(o.status||'order_received').label+'</td><td>'+(o.qtyProduced||'—')+'</td></tr>'; }).join('');
    html = '<h3 style="margin-bottom:8px;color:var(--brand)">Daily Production — '+filtered.length+' orders</h3><div class="tbl-wrap"><table class="rtbl"><tr><th>Job #</th><th>Customer</th><th>Company</th><th>Product</th><th>Status</th><th>Qty Produced</th></tr>'+rows+'</table></div>';
  } else if (activeReport === 'pending') {
    var pending = allOrders.filter(function(o){ return o.status && o.status !== 'ready'; });
    var rows2 = pending.map(function(o){ var late=o.etd&&new Date(o.etd)<new Date()?'🔴 ':''; return '<tr><td>'+(o.jobOrderNum||o.orderNum||'—')+'</td><td>'+(o.customerName||o.customer||'—')+'</td><td>'+getStage(o.status||'order_received').label+'</td><td>'+late+(o.etd||'—')+'</td><td>'+(isCL(o)?'C&L':isEF(o)?'AF':'Manual')+'</td></tr>'; }).join('');
    html = '<h3 style="margin-bottom:8px;color:var(--brand)">Pending Orders — '+pending.length+'</h3><div class="tbl-wrap"><table class="rtbl"><tr><th>Job #</th><th>Customer</th><th>Status</th><th>ETD</th><th>Company</th></tr>'+rows2+'</table></div>';
  } else if (activeReport === 'materials') {
    var matUsed = [];
    allJobs.forEach(function(j){ (j.materialsUsed||[]).forEach(function(m){ var d=new Date(m.addedAt||0); if(d>=from&&d<=to) matUsed.push(Object.assign({},m,{customer:j.customer,jobNum:j.jobOrderNum})); }); });
    var rows3 = matUsed.map(function(m){ return '<tr><td>'+(m.date||'—')+'</td><td>'+(m.jobNum||'—')+'</td><td>'+(m.customer||'—')+'</td><td>'+m.name+'</td><td>'+m.qty+'</td><td>'+(m.unit||'—')+'</td><td>'+(m.jumboWidth?m.jumboWidth+'mm':'—')+'</td></tr>'; }).join('');
    html = '<h3 style="margin-bottom:8px;color:var(--brand)">Materials Used — '+matUsed.length+' records</h3><div class="tbl-wrap"><table class="rtbl"><tr><th>Date</th><th>Job #</th><th>Customer</th><th>Material</th><th>Qty</th><th>Unit</th><th>Jumbo Width</th></tr>'+rows3+'</table></div>';
  } else if (activeReport === 'machine') {
    var machCount = {};
    Object.values(schedules).forEach(function(s){ if(!machCount[s.machine])machCount[s.machine]=0; machCount[s.machine]++; });
    var maxC = Math.max.apply(null, Object.values(machCount).concat([1]));
    var rows4 = MACHINES.map(function(m){ var cnt=machCount[m]||0; var pct=Math.round(cnt/maxC*100); return '<tr><td>'+m+'</td><td>'+cnt+'</td><td><div style="display:flex;align-items:center;gap:8px"><div style="flex:1;background:#e2e8f0;border-radius:4px;height:6px"><div style="width:'+pct+'%;background:#1d4ed8;height:6px;border-radius:4px"></div></div><span>'+pct+'%</span></div></td></tr>'; }).join('');
    html = '<h3 style="margin-bottom:8px;color:var(--brand)">Machine Performance</h3><div class="tbl-wrap"><table class="rtbl"><tr><th>Machine</th><th>Jobs</th><th>Utilization</th></tr>'+rows4+'</table></div>';
  }
  document.getElementById('report-out').innerHTML = '<div class="card">'+html+'</div>';
}

function printReport() {
  var out = (document.getElementById('report-out') || {}).innerHTML;
  if (!out) { showToast('Generate a report first'); return; }
  var win = window.open('', '_blank');
  win.document.write('<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Report</title><style>body{font-family:Arial,sans-serif;margin:20px;font-size:13px}table{width:100%;border-collapse:collapse}th{background:#f1f5f9;padding:8px;text-align:left;font-size:11px;text-transform:uppercase;border-bottom:2px solid #e2e8f0}td{padding:8px;border-bottom:1px solid #e2e8f0}@page{margin:10mm;size:A4}</style></head><body>'+out+'</body></html>');
  win.document.close();
  win.onload = function(){ win.print(); };
}

// ── USER MENU ──
function openUserMenu() {
  var body = '<div class="drow"><div class="dlbl">Name</div><div class="dval">'+CU.name+'</div></div>'
    + '<div class="drow"><div class="dlbl">Username</div><div class="dval">'+CU.id+'</div></div>'
    + '<div class="drow"><div class="dlbl">Role</div><div class="dval">'+CU.role+'</div></div>';
  var foot = '<button class="btn btn-red" onclick="doLogout();closeSheet()">🚪 Sign Out</button>';
  setSheet('Account', body, foot);
}

// ── SHEET ──
function setSheet(title, body, foot) {
  document.getElementById('sh-title').textContent = title || 'Details';
  document.getElementById('sh-body').innerHTML = body || '';
  document.getElementById('sh-foot').innerHTML = foot || '<button class="btn btn-out" onclick="closeSheet()">Close</button>';
  document.getElementById('sheet-bg').classList.add('open');
  document.getElementById('sheet').classList.add('open');
}
function closeSheet() {
  document.getElementById('sheet-bg').classList.remove('open');
  document.getElementById('sheet').classList.remove('open');
}

// ── TOAST ──
function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function(){ t.classList.remove('show'); }, 3000);
}
</script>
